---
# yamllint disable
name: Post-Merge Release Validation

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-non-macos:
    name: Compile ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            os: ubuntu-latest
          - platform: windows
            os: windows-latest
          - platform: linux
            os: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Java
        if: matrix.platform == 'android'
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@0ca7a949e71ae44c8e688a51c5e7e93b2c87e295
        with:
          flutter-version: "3.41.4"
          channel: "stable"
          cache: true

      - name: Disable Swift Package Manager
        run: flutter config --no-enable-swift-package-manager

      - name: Get dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test --dart-define=SKIP_GOLDENS=true

      - name: Compile Android APK (unsigned)
        if: matrix.platform == 'android'
        run: flutter build apk --release

      - name: Compile Windows App
        if: matrix.platform == 'windows'
        run: flutter build windows --release

      - name: Compile Linux App
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libsecret-1-dev
          flutter build linux --release

  build-macos:
    name: Compile ${{ matrix.platform }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Flutter
        uses: subosito/flutter-action@0ca7a949e71ae44c8e688a51c5e7e93b2c87e295
        with:
          flutter-version: "3.41.4"
          channel: "stable"
          cache: true

      - name: Disable Swift Package Manager
        run: flutter config --no-enable-swift-package-manager

      - name: Get dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test --dart-define=SKIP_GOLDENS=true

      - name: Setup CocoaPods Git Specs
        if: matrix.platform == 'macos'
        run: |
          rm -rf ~/.cocoapods/repos
          mkdir -p ~/.cocoapods/repos
          success=0
          for i in {1..5}; do
            if git clone --depth 1 https://github.com/CocoaPods/Specs.git ~/.cocoapods/repos/cocoapods; then
              success=1
              break
            fi
            echo "Git clone failed. Restarting macOS DNS responder..."
            sudo dscacheutil -flushcache || true
            sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.mDNSResponder.plist || true
            sudo killall -HUP mDNSResponder || true
            sleep 10
            rm -rf ~/.cocoapods/repos/cocoapods
          done
          if [ $success -eq 0 ]; then
            echo "Failed to clone CocoaPods specs after 5 retries"
            exit 1
          fi

      - name: Compile macOS App (unsigned)
        if: matrix.platform == 'macos'
        run: |
          success=0
          for i in {1..3}; do
            if flutter build macos --release; then
              success=1
              break
            fi
            echo "Build failed. Restarting macOS DNS responder and retrying..."
            sudo dscacheutil -flushcache || true
            sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.mDNSResponder.plist || true
            sudo killall -HUP mDNSResponder || true
            sleep 15
          done
          if [ $success -eq 0 ]; then
            echo "Failed to build macOS app after 3 retries"
            exit 1
          fi

