name: DCO Check
on:
  pull_request:
    branches: [ main ]

permissions: read-all

jobs:
  check-dco:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Verify Signed-off-by
        run: |
          echo "Checking commits for DCO (Signed-off-by) signature..."
          MISSING_DCO=0
          for commit in $(git rev-list origin/${{ github.base_ref }}..HEAD); do
            if ! git log -1 --format=%B $commit | grep -qi "Signed-off-by:"; then
              echo "❌ Error: Commit $commit is missing the 'Signed-off-by:' line."
              MISSING_DCO=1
            else
              echo "✅ Commit $commit is signed."
            fi
          done
          
          if [ $MISSING_DCO -eq 1 ]; then
            echo "Please amend your commits with 'git commit --amend -s' and force push."
            exit 1
          fi
