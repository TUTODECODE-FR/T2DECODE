name: CI

permissions:
  contents: read

on:
  push:
    branches: [ "**" ]
  pull_request:

jobs:
  flutter:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: subosito/flutter-action@0ca7a949e71ae44c8e688a51c5e7e93b2c87e295
        with:
          flutter-version: '3.41.4'
          channel: 'stable'
          cache: true
      - name: Get dependencies
        run: flutter pub get # NOSONAR
      - name: Check outdated
        run: flutter pub outdated
        continue-on-error: true
      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: true
      - name: Test
        run: flutter test
      # Scanning secrets in the codebase
      - name: Secrets Scan
        run: |
          # Simple check for common credential patterns (skip binary files and build artifacts)
          grep -rE "(AKIA|GH[A-Z0-9]{38}|SG\.[A-Za-z0-9_-]{22}\.[A-Za-z0-9_-]{43}|sk_live_[0-9a-zA-Z]{24})" . --exclude-dir=".git" --exclude-dir=".dart_tool" --exclude-dir="build" --exclude-dir=".github/workflows" --exclude="ci.yml" --binary-files=without-match && exit 1 || exit 0
