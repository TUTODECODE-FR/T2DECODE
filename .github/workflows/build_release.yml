---
# yamllint disable
# prettier-ignore
name: Build, Sign and Release Multi-Platform

permissions:
  contents: read

env:
  # Unifies push-tag and workflow_dispatch builds. On workflow_dispatch, this is the tag we rebuild.
  TARGET_TAG: ${{ github.event.inputs.target_tag != '' && github.event.inputs.target_tag || github.ref_name }}

'on':
  push:
    tags: [ "v*" ]
  workflow_dispatch:
    inputs:
      target_tag:
        description: "Tag de la release a mettre a jour (ex: v1.0.3)"
        required: false
        default: ""

jobs:
  build-non-macos:
    name: Build and sign ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      WINDOWS_PFX_BASE64: ${{ secrets.WINDOWS_PFX_BASE64 }}
      WINDOWS_PFX_PASSWORD: ${{ secrets.WINDOWS_PFX_PASSWORD }}
      LINUX_GPG_PRIVATE_KEY_BASE64: ${{ secrets.LINUX_GPG_PRIVATE_KEY_BASE64 }}
      LINUX_GPG_PASSPHRASE: ${{ secrets.LINUX_GPG_PASSPHRASE }}
      LINUX_GPG_KEY_ID: ${{ secrets.LINUX_GPG_KEY_ID }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            os: ubuntu-latest
            artifact_glob: |
              build/app/outputs/flutter-apk/app-release.apk
              build/app/outputs/bundle/release/app-release.aab
          - platform: windows
            os: windows-latest
            artifact_glob: |
              T2DECODE-Windows.zip
              T2DECODE-Setup.exe
          - platform: linux
            os: ubuntu-latest
            artifact_glob: |
              T2DECODE-Linux.tar.gz
              T2DECODE-Linux.deb
              T2DECODE-Linux.AppImage
              T2DECODE-Linux.tar.gz.sig
              T2DECODE-Linux.deb.sig

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          # On workflow_dispatch, build the exact tag the user asked for (avoid uploading main builds to an older tag release).
          ref: ${{ env.TARGET_TAG }}

      - name: Setup Java
        if: matrix.platform == 'android'
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@0ca7a949e71ae44c8e688a51c5e7e93b2c87e295
        with:
          flutter-version: "3.41.4"
          channel: "stable"
          cache: true

      - name: Disable Swift Package Manager
        run: flutter config --no-enable-swift-package-manager

      - name: Get dependencies
        run: flutter pub get # NOSONAR

      - name: Run tests
        run: flutter test --dart-define=SKIP_GOLDENS=true

      - name: Require Android signing secrets
        if: matrix.platform == 'android' && env.ANDROID_KEYSTORE_BASE64 != '' && env.ANDROID_KEYSTORE_PASSWORD != '' && env.ANDROID_KEY_ALIAS != '' && env.ANDROID_KEY_PASSWORD != ''
        shell: bash
        run: |
          test -n "${{ env.ANDROID_KEYSTORE_BASE64 }}"
          test -n "${{ env.ANDROID_KEYSTORE_PASSWORD }}"
          test -n "${{ env.ANDROID_KEY_ALIAS }}"
          test -n "${{ env.ANDROID_KEY_PASSWORD }}"

      - name: Configure Android keystore
        if: matrix.platform == 'android' && env.ANDROID_KEYSTORE_BASE64 != '' && env.ANDROID_KEYSTORE_PASSWORD != '' && env.ANDROID_KEY_ALIAS != '' && env.ANDROID_KEY_PASSWORD != ''
        shell: bash
        run: |
          echo "${{ env.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release-keystore.jks
          cat > android/key.properties <<'EOF'
          storeFile=app/release-keystore.jks
          storePassword=${{ env.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ env.ANDROID_KEY_ALIAS }}
          keyPassword=${{ env.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build signed Android artifacts
        if: matrix.platform == 'android'
        shell: bash
        run: |
          flutter build apk --release
          flutter build appbundle --release

      - name: Require Windows signing secrets
        if: matrix.platform == 'windows' && env.WINDOWS_PFX_BASE64 != '' && env.WINDOWS_PFX_PASSWORD != ''
        shell: pwsh
        run: |
          if (-not "${{ env.WINDOWS_PFX_BASE64 }}") { throw "Missing WINDOWS_PFX_BASE64" }
          if (-not "${{ env.WINDOWS_PFX_PASSWORD }}") { throw "Missing WINDOWS_PFX_PASSWORD" }

      - name: Install Inno Setup
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

      - name: Build Windows (unsigned by default)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          flutter build windows --release
          $iscc = $null
          $cmd = Get-Command "ISCC.exe" -ErrorAction SilentlyContinue
          if ($cmd) { $iscc = $cmd.Source }
          if (-not $iscc) {
            $candidates = @(
              "C:\\Program Files (x86)\\Inno Setup 6\\ISCC.exe",
              "C:\\Program Files\\Inno Setup 6\\ISCC.exe"
            )
            $iscc = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          }
          if (-not $iscc) { throw "ISCC.exe introuvable apres installation Inno Setup" }
          $ver = "${{ env.TARGET_TAG }}"
          if ($ver.StartsWith("v")) { $ver = $ver.Substring(1) }

          # Backward-compatible: older tags hardcode `#define MyAppVersion "x.y.z"`,
          # which breaks `/DMyAppVersion=...`. Patch the file in-place when needed.
          $iss = "windows\\installer\\tutodecode.iss"
          if (Test-Path $iss) {
            $txt = Get-Content -Raw $iss
            if ($txt -match '#define\\s+MyAppVersion\\s+\"' -and $txt -notmatch '#ifndef\\s+MyAppVersion') {
              $replacement = "#ifndef MyAppVersion`n  #define MyAppVersion ""0.0.0""`n#endif"
              $txt = $txt -replace '#define\\s+MyAppVersion\\s+\"[^\"]*\"', $replacement
              Set-Content -NoNewline -Encoding UTF8 $iss $txt
            }
          }
          & $iscc /DMyAppVersion=$ver windows\installer\tutodecode.iss
          # Inno Setup outputs relative to the script directory (windows/installer).
          # Normalize to repo root so artifacts + signing steps can find it reliably.
          $setupSrc = Join-Path "windows\\installer" "T2DECODE-Setup.exe"
          if (-not (Test-Path $setupSrc)) {
            throw "Setup EXE introuvable: $setupSrc"
          }
          Copy-Item -Force $setupSrc "T2DECODE-Setup.exe"
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath T2DECODE-Windows.zip

      - name: Sign Windows binaries
        if: matrix.platform == 'windows' && env.WINDOWS_PFX_BASE64 != '' && env.WINDOWS_PFX_PASSWORD != ''
        shell: pwsh
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String("${{ env.WINDOWS_PFX_BASE64 }}"))

          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "signtool.exe" -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -like "*x64*" } |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $signtool) { throw "signtool.exe introuvable" }

          $exePath = "build\windows\x64\runner\Release\T2DECODE.exe"
          & $signtool sign /f $pfxPath /p "${{ env.WINDOWS_PFX_PASSWORD }}" /fd SHA256 /tr "https://timestamp.digicert.com" /td SHA256 /v $exePath
          & $signtool verify /pa /v $exePath

          & $signtool sign /f $pfxPath /p "${{ env.WINDOWS_PFX_PASSWORD }}" /fd SHA256 /tr "https://timestamp.digicert.com" /td SHA256 /v T2DECODE-Setup.exe
          & $signtool verify /pa /v T2DECODE-Setup.exe
      - name: Build Linux artifact
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libsecret-1-dev gnupg ruby ruby-dev build-essential
          sudo apt-get install -y libfuse2 || sudo apt-get install -y libfuse2t64
          sudo gem install --no-document fpm
          flutter build linux --release
          tar -czvf T2DECODE-Linux.tar.gz -C build/linux/x64/release/bundle/ .

          VERSION_RAW="${TARGET_TAG#v}"
          if [ -z "$VERSION_RAW" ] || [ "$VERSION_RAW" = "$GITHUB_REF_NAME" ]; then
            VERSION_RAW="1.0.0"
          fi
          VERSION="${VERSION_RAW//-/_}"

          STAGE="$RUNNER_TEMP/linuxpkg"
          mkdir -p "$STAGE/opt/t2decode"
          mkdir -p "$STAGE/usr/share/applications"
          mkdir -p "$STAGE/usr/bin"

          cp -R build/linux/x64/release/bundle/* "$STAGE/opt/t2decode/"

          cat > "$STAGE/usr/share/applications/org.tutodecode.T2DECODE.desktop" <<'EOF'
          [Desktop Entry]
          Name=T2DECODE
          Comment=T2DECODE learning platform
          Exec=/opt/t2decode/T2DECODE
          Icon=/opt/t2decode/data/flutter_assets/assets/logo.png
          Terminal=false
          Type=Application
          Categories=Education;Development;
          EOF

          cat > "$STAGE/usr/bin/t2decode" <<'EOF'
          #!/usr/bin/env bash
          exec /opt/t2decode/T2DECODE "$@"
          EOF
          chmod +x "$STAGE/usr/bin/t2decode"

          fpm -s dir -t deb \
            -n t2decode \
            -v "$VERSION" \
            --architecture amd64 \
            --description "T2DECODE learning platform" \
            --maintainer "T2DECODE <contact@tutodecode.org>" \
            -C "$STAGE" \
            -p T2DECODE-Linux.deb \
            .

          # Build AppImage
          curl -L -o appimagetool-x86_64.AppImage https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          STAGE_APPIMAGE="$RUNNER_TEMP/AppDir"
          mkdir -p "$STAGE_APPIMAGE"
          cp -R build/linux/x64/release/bundle/* "$STAGE_APPIMAGE/"
          cat > "$STAGE_APPIMAGE/org.tutodecode.T2DECODE.desktop" <<'EOF'
          [Desktop Entry]
          Name=T2DECODE
          Comment=T2DECODE learning platform
          Exec=AppRun
          Icon=org.tutodecode.T2DECODE
          Terminal=false
          Type=Application
          Categories=Education;Development;
          EOF
          cp "assets/logo.png" "$STAGE_APPIMAGE/org.tutodecode.T2DECODE.png"
          ln -s T2DECODE "$STAGE_APPIMAGE/AppRun"
          APPIMAGETOOL=./appimagetool-x86_64.AppImage
          if ! $APPIMAGETOOL --version >/dev/null 2>&1; then
            $APPIMAGETOOL --appimage-extract
            APPIMAGETOOL=./squashfs-root/AppRun
          fi
          ARCH=x86_64 $APPIMAGETOOL "$STAGE_APPIMAGE" T2DECODE-Linux.AppImage

      - name: Require Linux signing secrets
        if: matrix.platform == 'linux' && env.LINUX_GPG_PRIVATE_KEY_BASE64 != '' && env.LINUX_GPG_PASSPHRASE != '' && env.LINUX_GPG_KEY_ID != ''
        shell: bash
        run: |
          test -n "${{ env.LINUX_GPG_PRIVATE_KEY_BASE64 }}"
          test -n "${{ env.LINUX_GPG_PASSPHRASE }}"
          test -n "${{ env.LINUX_GPG_KEY_ID }}"

      - name: Sign Linux artifact (GPG detached signature)
        if: matrix.platform == 'linux' && env.LINUX_GPG_PRIVATE_KEY_BASE64 != '' && env.LINUX_GPG_PASSPHRASE != '' && env.LINUX_GPG_KEY_ID != ''
        shell: bash
        run: |
          export GNUPGHOME="$RUNNER_TEMP/gnupg"
          mkdir -p "$GNUPGHOME"
          chmod 700 "$GNUPGHOME"

          echo "${{ env.LINUX_GPG_PRIVATE_KEY_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/linux.key"
          gpg --batch --import "$RUNNER_TEMP/linux.key"

          printf '%s' "${{ env.LINUX_GPG_PASSPHRASE }}" > "$RUNNER_TEMP/gpg.pass"
          gpg --batch --yes --pinentry-mode loopback \
            --passphrase-file "$RUNNER_TEMP/gpg.pass" \
            --local-user "${{ env.LINUX_GPG_KEY_ID }}" \
            --output T2DECODE-Linux.tar.gz.sig \
            --detach-sign T2DECODE-Linux.tar.gz

          gpg --batch --yes --pinentry-mode loopback \
            --passphrase-file "$RUNNER_TEMP/gpg.pass" \
            --local-user "${{ env.LINUX_GPG_KEY_ID }}" \
            --output T2DECODE-Linux.deb.sig \
            --detach-sign T2DECODE-Linux.deb

      - name: Upload platform artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: build-${{ matrix.platform }}
          path: ${{ matrix.artifact_glob }}

  build-macos:
    name: Build and sign ${{ matrix.platform }}
    runs-on: macos-latest
    permissions:
      contents: read
    env:
      MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
      MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
      MACOS_CERT_IDENTITY: ${{ secrets.MACOS_CERT_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      IOS_CERT_P12_BASE64: ${{ secrets.IOS_CERT_P12_BASE64 }}
      IOS_CERT_PASSWORD: ${{ secrets.IOS_CERT_PASSWORD }}
      IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
      IOS_EXPORT_OPTIONS_PLIST_BASE64: ${{ secrets.IOS_EXPORT_OPTIONS_PLIST_BASE64 }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            artifact_glob: |
              T2DECODE-macOS.zip
              T2DECODE-macOS.dmg
              T2DECODE-macOS.pkg

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          # On workflow_dispatch, build the exact tag the user asked for (avoid uploading main builds to an older tag release).
          ref: ${{ env.TARGET_TAG }}

      - name: Setup Flutter
        uses: subosito/flutter-action@0ca7a949e71ae44c8e688a51c5e7e93b2c87e295
        with:
          flutter-version: "3.41.4"
          channel: "stable"
          cache: true

      - name: Disable Swift Package Manager
        run: flutter config --no-enable-swift-package-manager

      - name: Get dependencies
        run: flutter pub get # NOSONAR

      - name: Run tests
        run: flutter test --dart-define=SKIP_GOLDENS=true

      - name: Require macOS signing/notarization secrets
        if: matrix.platform == 'macos' && env.MACOS_CERT_P12_BASE64 != '' && env.MACOS_CERT_PASSWORD != '' && env.MACOS_CERT_IDENTITY != '' && env.APPLE_ID != '' && env.APPLE_APP_SPECIFIC_PASSWORD != '' && env.APPLE_TEAM_ID != ''
        shell: bash
        run: |
          test -n "${{ env.MACOS_CERT_P12_BASE64 }}"
          test -n "${{ env.MACOS_CERT_PASSWORD }}"
          test -n "${{ env.MACOS_CERT_IDENTITY }}"
          test -n "${{ env.APPLE_ID }}"
          test -n "${{ env.APPLE_APP_SPECIFIC_PASSWORD }}"
          test -n "${{ env.APPLE_TEAM_ID }}"

      - name: Setup CocoaPods Git Specs
        if: matrix.platform == 'macos'
        run: |
          rm -rf ~/.cocoapods/repos
          mkdir -p ~/.cocoapods/repos
          success=0
          for i in {1..5}; do
            if git clone --depth 1 https://github.com/CocoaPods/Specs.git ~/.cocoapods/repos/cocoapods; then
              success=1
              break
            fi
            echo "Git clone failed. Restarting macOS DNS responder..."
            sudo dscacheutil -flushcache || true
            sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.mDNSResponder.plist || true
            sudo killall -HUP mDNSResponder || true
            sleep 10
            rm -rf ~/.cocoapods/repos/cocoapods
          done
          if [ $success -eq 0 ]; then
            echo "Failed to clone CocoaPods specs after 5 retries"
            exit 1
          fi

      - name: Build macOS app (unsigned by default)
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          success=0
          for i in {1..3}; do
            if flutter build macos --release; then
              success=1
              break
            fi
            echo "Build failed. Restarting macOS DNS responder and retrying..."
            sudo dscacheutil -flushcache || true
            sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.mDNSResponder.plist || true
            sudo killall -HUP mDNSResponder || true
            sleep 15
          done
          if [ $success -eq 0 ]; then
            echo "Failed to build macOS app after 3 retries"
            exit 1
          fi
          killall dart || true
          sync
          sleep 2

          APP_PATH="build/macos/Build/Products/Release/T2DECODE.app"

          # DMG
          chmod +x scripts/build_dmg.sh
          ./scripts/build_dmg.sh
          cp -f build/macos/Build/Products/Release/T2DECODE-macOS.dmg T2DECODE-macOS.dmg

          # PKG (unsigned by default)
          chmod +x scripts/build_pkg.sh
          APP_VERSION="${TARGET_TAG#v}" ./scripts/build_pkg.sh
          mv build/macos/Build/Products/Release/T2DECODE_Installer.pkg T2DECODE-macOS-Installer.pkg
          cp -f T2DECODE-macOS-Installer.pkg T2DECODE-macOS.pkg

          # Zip
          sync
          sleep 2
          ditto -c -k --keepParent "$APP_PATH" T2DECODE-macOS.zip
          echo "🏁 Fin de l'étape Build macOS app"
          
          # Force kill any lingering background processes that hold stdout open
          pkill -f flutter || true
          pkill -f dart || true

      - name: Sign and notarize macOS artifacts
        if: matrix.platform == 'macos' && env.MACOS_CERT_P12_BASE64 != '' && env.MACOS_CERT_PASSWORD != '' && env.MACOS_CERT_IDENTITY != '' && env.APPLE_ID != '' && env.APPLE_APP_SPECIFIC_PASSWORD != '' && env.APPLE_TEAM_ID != ''
        shell: bash
        run: |
          APP_PATH="build/macos/Build/Products/Release/T2DECODE.app"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          CERT_PATH="$RUNNER_TEMP/macos_cert.p12"

          echo "${{ env.MACOS_CERT_P12_BASE64 }}" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "build" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "build" "$KEYCHAIN_PATH"
          # shellcheck disable=SC2046
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "${{ env.MACOS_CERT_PASSWORD }}" -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple:,codesign:,productsign: -s -k "build" "$KEYCHAIN_PATH"

          codesign --force --deep --options runtime --timestamp --sign "${{ env.MACOS_CERT_IDENTITY }}" "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          spctl --assess --type execute --verbose "$APP_PATH"

          rm -f T2DECODE-macOS.zip
          ditto -c -k --keepParent "$APP_PATH" T2DECODE-macOS.zip

          xcrun notarytool submit T2DECODE-macOS.zip \
            --apple-id "${{ env.APPLE_ID }}" \
            --password "${{ env.APPLE_APP_SPECIFIC_PASSWORD }}" \
            --team-id "${{ env.APPLE_TEAM_ID }}" \
            --wait
          xcrun stapler staple "$APP_PATH"

          xcrun stapler staple T2DECODE-macOS.dmg

          productsign --sign "${{ env.MACOS_CERT_IDENTITY }}" T2DECODE-macOS-Installer.pkg T2DECODE-macOS-Installer-Signed.pkg
          xcrun notarytool submit T2DECODE-macOS-Installer-Signed.pkg \
            --apple-id "${{ env.APPLE_ID }}" \
            --password "${{ env.APPLE_APP_SPECIFIC_PASSWORD }}" \
            --team-id "${{ env.APPLE_TEAM_ID }}" \
            --wait
          xcrun stapler staple T2DECODE-macOS-Installer-Signed.pkg
          mv T2DECODE-macOS-Installer-Signed.pkg T2DECODE-macOS.pkg

      - name: Upload platform artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: build-${{ matrix.platform }}
          path: ${{ matrix.artifact_glob }}

  release:
    name: Create GitHub Release
    needs: [build-non-macos, build-macos]
    if: (github.event_name == 'workflow_dispatch' || github.ref_type == 'tag' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      LINUX_GPG_PRIVATE_KEY_BASE64: ${{ secrets.LINUX_GPG_PRIVATE_KEY_BASE64 }}
      LINUX_GPG_PASSPHRASE: ${{ secrets.LINUX_GPG_PASSPHRASE }}
      LINUX_GPG_KEY_ID: ${{ secrets.LINUX_GPG_KEY_ID }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.inputs.target_tag != '' && github.event.inputs.target_tag || github.ref }}
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: artifacts
          pattern: build-*
          merge-multiple: true

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p release_assets
          APK_SRC="$(find artifacts -name 'app-release.apk' -print -quit || true)"
          if [ -n "$APK_SRC" ]; then cp -f "$APK_SRC" release_assets/T2DECODE-Android.apk; fi
          AAB_SRC="$(find artifacts -name 'app-release.aab' -print -quit || true)"
          if [ -n "$AAB_SRC" ]; then cp -f "$AAB_SRC" release_assets/T2DECODE-Android.aab; fi
          cp -f artifacts/T2DECODE-Windows.zip release_assets/T2DECODE-Windows.zip || true
          cp -f artifacts/T2DECODE-Setup.exe release_assets/T2DECODE-Setup.exe || true
          cp -f artifacts/T2DECODE-macOS.zip release_assets/T2DECODE-macOS.zip || true
          cp -f artifacts/T2DECODE-macOS.dmg release_assets/T2DECODE-macOS.dmg || true
          cp -f artifacts/T2DECODE-macOS.pkg release_assets/T2DECODE-macOS.pkg || true
          cp -f artifacts/T2DECODE-Linux.tar.gz release_assets/T2DECODE-Linux.tar.gz || true
          cp -f artifacts/T2DECODE-Linux.deb release_assets/T2DECODE-Linux.deb || true
          cp -f artifacts/T2DECODE-Linux.AppImage release_assets/T2DECODE-Linux.AppImage || true
          cp -f artifacts/T2DECODE-Linux.tar.gz.sig release_assets/T2DECODE-Linux.tar.gz.sig || true
          cp -f artifacts/T2DECODE-Linux.deb.sig release_assets/T2DECODE-Linux.deb.sig || true
          cp -f artifacts/*.ipa release_assets/T2DECODE-iOS.ipa || true
          cp -f assets/logo.png release_assets/T2DECODE.png || true
          if ls -A release_assets >/dev/null 2>&1; then
            (cd release_assets && sha256sum ./* > SHA256SUMS.txt)
          fi
          ls -la release_assets

      - name: Sign release checksums (optional)
        if: env.LINUX_GPG_PRIVATE_KEY_BASE64 != '' && env.LINUX_GPG_PASSPHRASE != '' && env.LINUX_GPG_KEY_ID != ''
        shell: bash
        run: |
          export GNUPGHOME="$RUNNER_TEMP/gnupg-release"
          mkdir -p "$GNUPGHOME"
          chmod 700 "$GNUPGHOME"

          echo "${{ env.LINUX_GPG_PRIVATE_KEY_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/release.key"
          gpg --batch --import "$RUNNER_TEMP/release.key"

          printf '%s' "${{ env.LINUX_GPG_PASSPHRASE }}" > "$RUNNER_TEMP/release.pass"
          gpg --batch --yes --pinentry-mode loopback \
            --passphrase-file "$RUNNER_TEMP/release.pass" \
            --local-user "${{ env.LINUX_GPG_KEY_ID }}" \
            --output release_assets/SHA256SUMS.txt.sig \
            --detach-sign release_assets/SHA256SUMS.txt

      - name: Install Cosign
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0

      - name: Sign release checksums with Cosign (keyless)
        shell: bash
        run: |
          cosign sign-blob \
            --yes \
            --output-signature release_assets/SHA256SUMS.txt.sig \
            --output-certificate release_assets/SHA256SUMS.txt.pem \
            release_assets/SHA256SUMS.txt

      - name: Attest release assets provenance
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2 # v2.2.3
        with:
          subject-path: 'release_assets/*'

      - name: Remove existing release assets (idempotent)
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${{ github.event.inputs.target_tag || github.ref_name }}"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            echo "No existing release for $TAG (nothing to delete)."
            exit 0
          fi

          # Safety: delete only what we are actually about to re-upload.
          # This prevents wiping existing assets when a platform build fails.
          mapfile -t ASSETS_TO_REPLACE < <(cd release_assets && ls -1)

          EXISTING="$(gh release view "$TAG" --json assets --jq '.assets[].name' || true)"
          for name in "${ASSETS_TO_REPLACE[@]}"; do
            if printf '%s\n' "$EXISTING" | grep -Fxq "$name"; then
              echo "Deleting $name"
              gh release delete-asset "$TAG" "$name" -y
            fi
          done

      - name: Generate and clean release notes
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.target_tag || github.ref_name }}
        shell: bash
        run: |
          gh release notes "$TAG" --exclude-drafts > raw_notes.md || echo "* Mises à jour de la version" > raw_notes.md
          cat <<'EOF' > clean_notes.py
          import re, os, subprocess

          tag = os.environ.get('TAG', '')
          
          # Récupérer le tag précédent
          try:
              # On cherche le tag précédent direct
              prev_tag = subprocess.check_output(['git', 'describe', '--tags', '--abbrev=0', tag + '^'], text=True).strip()
          except Exception:
              try:
                  prev_tag = subprocess.check_output(['git', 'describe', '--tags', '--abbrev=0', 'HEAD^'], text=True).strip()
              except Exception:
                  prev_tag = None

          commits_list = []
          files_list = []

          if prev_tag:
              print(f"Tag précédent détecté : {prev_tag}")
              # Récupérer les commits
              try:
                  log_out = subprocess.check_output(['git', 'log', f'{prev_tag}..{tag}', '--pretty=format:- %s (%h)', '--no-merges'], text=True)
                  commits_list = [line.strip() for line in log_out.split('\n') if line.strip()]
              except Exception as e:
                  print(f"Erreur lors de la récupération des commits : {e}")
              
              # Récupérer les fichiers modifiés
              try:
                  diff_out = subprocess.check_output(['git', 'diff', '--name-only', f'{prev_tag}..{tag}'], text=True)
                  files_list = [line.strip() for line in diff_out.split('\n') if line.strip()]
              except Exception as e:
                  print(f"Erreur lors de la récupération des fichiers modifiés : {e}")
          else:
              print("Aucun tag précédent trouvé.")

          # Fallback sur gh release notes si raw_notes existe
          gh_notes = ""
          if os.path.exists('raw_notes.md'):
              with open('raw_notes.md', 'r') as f:
                  gh_notes = f.read().strip()

          # Catégorisation des commits
          features = []
          fixes = []
          docs = []
          maintenance = []
          others = []

          # Filtrage pour ne pas inclure des commits triviaux ou de release automatique
          ignore_patterns = [
              r'^[-\s]*chore:\s*release',
              r'^[-\s]*chore:\s*increment version',
              r'^[-\s]*chore:\s*bump version',
              r'^[-\s]*merge'
          ]

          for commit in commits_list:
              msg = commit.lstrip('- ').strip()
              # Supprimer les 'by @username' ou les mentions d'auteurs
              msg = re.sub(r'\s*by\s*@[a-zA-Z0-9_-]+', '', msg)
              
              if any(re.search(pat, msg, re.IGNORECASE) for pat in ignore_patterns):
                  continue
                  
              if msg.lower().startswith('feat') or 'feature' in msg.lower():
                  features.append(f"- {msg}")
              elif msg.lower().startswith('fix') or 'bug' in msg.lower():
                  fixes.append(f"- {msg}")
              elif msg.lower().startswith('docs'):
                  docs.append(f"- {msg}")
              elif any(msg.lower().startswith(x) for x in ['chore', 'ci', 'refactor', 'style', 'test', 'build']):
                  maintenance.append(f"- {msg}")
              else:
                  others.append(f"- {msg}")

          # Construction des notes de version finales
          final_content = ""

          # 1. Message d'avertissement de sous-version
          if tag and re.match(r'^v?\d+\.\d+\.\d+\.\d+$', tag):
              final_content += "> [!NOTE]\n> Cette version (" + tag + ") est une mise à jour de maintenance automatisée. Il n'est pas nécessaire de la réinstaller si vous disposez déjà d'une version stable récente (ex: v1.0.2).\n\n"

          # 2. Section des changements
          final_content += "## What's Changed\n\n"

          has_changelog = False
          if features:
              final_content += "### 🚀 Nouvelles fonctionnalités\n" + "\n".join(features) + "\n\n"
              has_changelog = True
          if fixes:
              final_content += "### 🐛 Corrections de bugs\n" + "\n".join(fixes) + "\n\n"
              has_changelog = True
          if docs:
              final_content += "### 📝 Documentation\n" + "\n".join(docs) + "\n\n"
              has_changelog = True
          if maintenance:
              final_content += "### ⚙️ Maintenance & CI/CD\n" + "\n".join(maintenance) + "\n\n"
              has_changelog = True
          if others:
              final_content += "### 🔄 Autres changements\n" + "\n".join(others) + "\n\n"
              has_changelog = True

          # Si on n'a aucun commit détaillé mais qu'on a les notes de GitHub, on met les notes de GitHub
          if not has_changelog and gh_notes and "* Mises à jour de la version" not in gh_notes:
              # Nettoyer les mentions by @username dans les notes gh
              cleaned_gh = re.sub(r'\s*by\s*@[a-zA-Z0-9_-]+', '', gh_notes)
              parts = re.split(r'##\s+(?:New\s+)?Contributors', cleaned_gh, flags=re.IGNORECASE)
              cleaned_gh = parts[0]
              parts = re.split(r'##\s+Nouveaux\s+contributeurs', cleaned_gh, flags=re.IGNORECASE)
              cleaned_gh = parts[0]
              # Éviter de dupliquer le header déjà ajouté plus haut
              cleaned_gh = re.sub(r"^\s*##\s+What's Changed\s*\n+", "", cleaned_gh, flags=re.IGNORECASE)
              final_content += cleaned_gh.strip() + "\n\n"
          elif not has_changelog:
              final_content += "* Mises à jour et correctifs de la version.\n\n"

          # 3. Liste des fichiers modifiés
          if files_list:
              final_content += "### 📂 Fichiers modifiés\n"
              for f in files_list[:15]:
                  final_content += f"- `{f}`\n"
              if len(files_list) > 15:
                  final_content += f"- *Et {len(files_list) - 15} autres fichiers...*\n"
              final_content += "\n"

          # 4. Lien vers le changelog complet
          if prev_tag:
              final_content += f"**Changelog complet** : [{prev_tag}...{tag}](https://github.com/TUTODECODE-FR/T2DECODE/compare/{prev_tag}...{tag})\n"

          with open('cleaned_notes.md', 'w') as f:
              f.write(final_content.strip())
          EOF
          # Remove 10 leading spaces of indentation
          sed -i 's/^[[:space:]]\{10\}//' clean_notes.py
          python3 clean_notes.py
          cat cleaned_notes.md

      - name: Create or update release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b
        with:
          tag_name: ${{ github.event.inputs.target_tag || github.ref_name }}
          files: release_assets/*
          body_path: cleaned_notes.md
          generate_release_notes: false
          draft: false
          prerelease: false
          fail_on_unmatched_files: false

  publish-sourceforge:
    name: Publish to SourceForge
    needs: release
    # Ne tourne que si la clé SSH SourceForge est configurée
    if: always() && needs.release.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SF_USER: winancher
      SF_PROJECT: t2decode
      SF_KEY: ${{ secrets.SF_PRIVATE_KEY }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Skip if SourceForge SSH key not configured
        if: env.SF_KEY == ''
        run: |
          echo "::notice::Secret SF_PRIVATE_KEY manquant — upload SourceForge ignoré."
          echo "Pour activer : configurer le secret SF_PRIVATE_KEY avec la clé SSH privée enregistrée sur sourceforge.net/account"

      - name: Download release assets
        if: env.SF_KEY != ''
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: artifacts
          pattern: build-*
          merge-multiple: true

      - name: Prepare assets for SourceForge
        if: env.SF_KEY != ''
        shell: bash
        run: |
          mkdir -p sf_assets
          TAG="${{ github.event.inputs.target_tag || github.ref_name }}"

          # Copier les artifacts dans sf_assets (même liste que GitHub Release)
          APK_SRC="$(find artifacts -name 'app-release.apk' -print -quit || true)"
          if [ -n "$APK_SRC" ]; then cp -f "$APK_SRC" sf_assets/T2DECODE-Android.apk; fi
          AAB_SRC="$(find artifacts -name 'app-release.aab' -print -quit || true)"
          if [ -n "$AAB_SRC" ]; then cp -f "$AAB_SRC" sf_assets/T2DECODE-Android.aab; fi
          cp -f artifacts/T2DECODE-Windows.zip  sf_assets/ 2>/dev/null || true
          cp -f artifacts/T2DECODE-Setup.exe    sf_assets/ 2>/dev/null || true
          cp -f artifacts/T2DECODE-macOS.zip    sf_assets/ 2>/dev/null || true
          cp -f artifacts/T2DECODE-macOS.dmg    sf_assets/ 2>/dev/null || true
          cp -f artifacts/T2DECODE-macOS.pkg    sf_assets/ 2>/dev/null || true
          cp -f artifacts/T2DECODE-Linux.tar.gz sf_assets/ 2>/dev/null || true
          cp -f artifacts/T2DECODE-Linux.deb    sf_assets/ 2>/dev/null || true
          cp -f artifacts/T2DECODE-Linux.AppImage sf_assets/ 2>/dev/null || true
          cp -f artifacts/*.ipa                 sf_assets/T2DECODE-iOS.ipa 2>/dev/null || true

          echo "Assets à uploader sur SourceForge ($TAG) :"
          ls -lh sf_assets/

      - name: Upload to SourceForge via SFTP
        if: env.SF_KEY != ''
        shell: bash
        run: |
          TAG="${{ github.event.inputs.target_tag || github.ref_name }}"
          SF_PATH="/home/frs/project/$SF_PROJECT/$TAG"

          # Configurer la clé SSH
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SF_KEY" > ~/.ssh/sf_key
          chmod 600 ~/.ssh/sf_key

          # Accepter automatiquement la clé de frs.sourceforge.net
          ssh-keyscan -t rsa,ecdsa frs.sourceforge.net >> ~/.ssh/known_hosts 2>/dev/null

          # Créer le dossier distant et uploader tous les fichiers
          sftp -i ~/.ssh/sf_key -b - "$SF_USER@frs.sourceforge.net" <<SFTP_COMMANDS
          -mkdir $SF_PATH
          cd $SF_PATH
          $(for f in sf_assets/*; do echo "put $f"; done)
          bye
          SFTP_COMMANDS

          echo "✅ Upload SourceForge terminé pour $TAG"
          echo "🔗 https://sourceforge.net/projects/$SF_PROJECT/files/$TAG/"

          # Nettoyer la clé SSH
          rm -f ~/.ssh/sf_key

  cleanup-tag:
    name: Delete Git Tag on Failure
    needs: [build-non-macos, build-macos]
    if: failure() && (github.event_name == 'workflow_dispatch' || github.ref_type == 'tag' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete Tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.target_tag || github.ref_name }}"
          echo "Build failed. Deleting tag $TAG from repository..."
          gh api -X DELETE "/repos/${{ github.repository }}/git/refs/tags/$TAG" || true
