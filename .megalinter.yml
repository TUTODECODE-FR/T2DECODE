# MegaLinter Configuration File
# https://megalinter.io

# Configuration globale
SHOW_ELAPSED_TIME: true

# Désactiver les linters générant des faux positifs fréquents
DISABLE:
  - SPELL # Désactive le dictionnaire (jargon technique et français)
  - COPYPASTE # Désactive le détecteur de duplication (normal pour les cours et labs)

DISABLE_LINTERS:
  - YAML_V8R

# Configuration des linters pour exclure les faux positifs
REPOSITORY_DEVSKIM_FILTER_REGEX_INCLUDE: "lib/.*"
REPOSITORY_DEVSKIM_FILTER_REGEX_EXCLUDE: "(lib/features/(lab|tools|ghost_ai)/|lib/core/security/|lib/core/providers/settings_provider.dart)"
