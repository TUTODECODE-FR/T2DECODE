name: tutodecode
description: "T2DECODE - Plateforme d'apprentissage locale"
publish_to: 'none'
version: 1.0.1+15
environment:
  sdk: ">=2.18.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  provider: ^6.0.5
  shared_preferences: ^2.0.15
  flutter_markdown_plus: ^1.0.7
  flutter_highlight: ^0.7.0
  http: ^1.2.0
  flutter_animate: ^4.5.2
  glass_kit: ^4.0.2
  flutter_blurhash: ^0.9.1
  animations: ^2.1.1
  path_provider: ^2.1.2
  connectivity_plus: ^7.0.0
  cryptography: ^2.9.0
  flutter_secure_storage: ^10.0.0
  file_selector: ^1.1.0
  file_picker: ^8.0.0
  device_info_plus: ^12.3.0
  network_info_plus: ^7.0.0
  qr_flutter: ^4.1.0
  crypto: ^3.0.3


dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.0
  mockito: ^5.4.4
  build_runner: ^2.4.8
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/courses.json
    - assets/cheat_sheets.json
    - assets/netkit_cheat_sheets.json
    - assets/manifest.json
    - assets/asset_checksums.json
    - assets/logo.png
  fonts:
    - family: Aileron
      fonts:
        - asset: assets/fonts/Aileron-Thin.otf
          weight: 100
        - asset: assets/fonts/Aileron-ThinItalic.otf
          weight: 100
          style: italic
        - asset: assets/fonts/Aileron-UltraLight.otf
          weight: 200
        - asset: assets/fonts/Aileron-UltraLightItalic.otf
          weight: 200
          style: italic
        - asset: assets/fonts/Aileron-Light.otf
          weight: 300
        - asset: assets/fonts/Aileron-LightItalic.otf
          weight: 300
          style: italic
        - asset: assets/fonts/Aileron-Regular.otf
          weight: 400
        - asset: assets/fonts/Aileron-Italic.otf
          weight: 400
          style: italic
        - asset: assets/fonts/Aileron-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Aileron-SemiBoldItalic.otf
          weight: 600
          style: italic
        - asset: assets/fonts/Aileron-Bold.otf
          weight: 700
        - asset: assets/fonts/Aileron-BoldItalic.otf
          weight: 700
          style: italic
        - asset: assets/fonts/Aileron-Heavy.otf
          weight: 800
        - asset: assets/fonts/Aileron-HeavyItalic.otf
          weight: 800
          style: italic
        - asset: assets/fonts/Aileron-Black.otf
          weight: 900
        - asset: assets/fonts/Aileron-BlackItalic.otf
          weight: 900
          style: italic

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/logo.png"
  windows:
    generate: true
    image_path: "assets/logo.png"
  macos:
    generate: true
    image_path: "assets/logo.png"
  image_path: "assets/logo.png"
  adaptive_icon_background: "#12121A"
  adaptive_icon_foreground: "assets/logo.png"

flutter_native_splash:
  color: "#12121A"
  image: "assets/logo.png"
  android: true
  ios: true
  fullscreen: true

dependency_overrides:
  path_provider_foundation: 2.5.1
